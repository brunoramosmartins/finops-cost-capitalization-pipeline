version: 2

models:
  - name: fct_cost_classification
    description: >
      Gold fact table that classifies each billing line into an accounting
      recommendation domain with explicit rationale and review flags.
    columns:
      - name: line_item_id
        description: Billing line identifier.
        tests:
          - not_null
          - unique
      - name: classification_status
        description: Accounting recommendation domain.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['opex', 'capex_eligible', 'shared_cost_review', 'unclassified']
      - name: classification_reason
        description: Human-readable rule explanation for the classification.
        tests:
          - not_null
      - name: unblended_cost
        description: Classified unblended cost at the billing line grain.
        tests:
          - non_negative_unless_type:
              arguments:
                type_column: line_item_type
                exempt_types: ['Credit', 'Discount']
      - name: blended_cost
        description: Classified blended cost at the billing line grain.
        tests:
          - non_negative_unless_type:
              arguments:
                type_column: line_item_type
                exempt_types: ['Credit', 'Discount']
      - name: policy_version
        description: Accounting policy version used in classification.
        tests:
          - not_null

  - name: fct_capex_candidate_costs
    description: Filtered Gold fact for lines that are CAPEX-eligible under the current policy.
    columns:
      - name: line_item_id
        description: Billing line identifier.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('fct_cost_classification')
                field: line_item_id
      - name: unblended_cost
        description: CAPEX-eligible unblended cost.
        tests:
          - non_negative_values
      - name: blended_cost
        description: CAPEX-eligible blended cost.
        tests:
          - non_negative_values
